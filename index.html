        .info { font-size: 0.8rem; color: #666; margin-bottom: 10px; }
        .slots { display: flex; gap: 5px; margin: 15px 0; background: #222; padding: 10px; border-radius: 12px; height: 100px; }
        .slot { flex: 1; background: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; color: #333; height: 100%; text-align: center; padding: 2px; line-height: 1.2; overflow: hidden; }

        #final-result { margin-top: 15px; padding: 12px; background: var(--accent); border-radius: 12px; min-height: 110px; border: 1px dashed var(--secondary); font-size: 0.95rem; }
        .res-name { color: var(--primary); font-size: 1.3rem; font-weight: bold; display: block; }
        .res-addr { color: #555; font-size: 0.8rem; display: block; margin: 5px 0; }
        .btn-map { background: #2a9d8f; color: white; text-decoration: none; padding: 8px 15px; border-radius: 6px; font-size: 0.85rem; display: inline-block; margin-top: 5px; }
        .spinning { animation: blur 0.1s infinite; }
        @keyframes blur { 0%, 100% { filter: blur(0px); } 50% { filter: blur(1.2px); } }

    function startSpin() {
        const catSlot = document.getElementById('slot-cat');
        const resSlot = document.getElementById('slot-res');
        const mealSlot = document.getElementById('slot-meal');
        const resultDiv = document.getElementById('final-result');

        [catSlot, resSlot, mealSlot].forEach(s => s.classList.add('spinning'));
        resultDiv.innerHTML = "🎲 正在巡迴三峽商圈中...";

        setTimeout(() => {
            const categories = Object.keys(foodData);
            const selectedCat = categories[Math.floor(Math.random() * categories.length)];
            
            const restaurants = Object.keys(foodData[selectedCat]);
            const selectedResName = restaurants[Math.floor(Math.random() * restaurants.length)];
            const selectedResInfo = foodData[selectedCat][selectedResName];
            
            const selectedMeal = selectedResInfo.meals[Math.floor(Math.random() * selectedResInfo.meals.length)];

            [catSlot, resSlot, mealSlot].forEach(s => s.classList.remove('spinning'));
            
            catSlot.innerText = selectedCat;
            resSlot.innerText = selectedResName;
            mealSlot.innerText = selectedMeal;

            const mapSearch = encodeURIComponent('三峽 ' + selectedResName + ' ' + selectedResInfo.addr);
            const mapUrl = `https://www.google.com/maps/search/?api=1&query=${mapSearch}`;

            resultDiv.innerHTML = `
                <span class="res-name">🎉 ${selectedResName}</span>
                <span class="res-addr">📍 三峽區${selectedResInfo.addr}</span>
                <p>今天推薦吃：<strong style="color:var(--primary)">${selectedMeal}</strong></p>
                <a href="${mapUrl}" target="_blank" class="btn-map">🗺️ 導航去吃 (100%三峽)</a>
            `;
            
        }, 1200);
    }
